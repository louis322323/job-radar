<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Job-radar</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23EDF0EA'/%3E%3Ccircle cx='16' cy='16' r='10' fill='none' stroke='%235E8C61' stroke-width='1.5'/%3E%3Ccircle cx='16' cy='16' r='5' fill='none' stroke='%235E8C61' stroke-width='1.5'/%3E%3Cpath d='M16 16 L26 16 A10 10 0 0 0 19 6.5 Z' fill='%23E3B12F' opacity='0.85'/%3E%3Ccircle cx='16' cy='16' r='1.8' fill='%2323282E'/%3E%3C/svg%3E">
<meta name="theme-color" content="#EDF0EA">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Sans:wght@400;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#EDF0EA;      /* plankort paper */
  --ink:#23282E;
  --line:#C6CCC2;
  --zone-a:#E3B12F;     /* boligområde-gul: score >= 80 */
  --zone-b:#5E8C61;     /* rekreativ-grøn: 70–79 */
  --zone-c:#8C97A3;     /* uden signatur: < 70 / unscored */
  --zone-w:#4E7CA8;     /* teknisk-blå: page watch */
  --card:#F7F8F5;
}
*{box-sizing:border-box;margin:0}
body{background:var(--paper);color:var(--ink);
  font:400 15px/1.55 "IBM Plex Sans",sans-serif;padding:0 16px 80px}
.wrap{max-width:860px;margin:0 auto}
header{padding:34px 0 10px;border-bottom:2px solid var(--ink)}
h1{font:700 28px/1.1 "Space Grotesk",sans-serif;letter-spacing:-.5px}
h1 small{font:500 13px "IBM Plex Mono",monospace;color:#5b6168;
  display:block;margin-top:6px;letter-spacing:0}
/* signaturforklaring — the map legend */
.legend{display:flex;flex-wrap:wrap;gap:14px 22px;padding:14px 0;
  border-bottom:1px solid var(--line);font-size:13px}
.legend span{display:flex;align-items:center;gap:7px}
.sw{width:18px;height:13px;border:1px solid var(--ink);flex:none}
.sw.a{background:var(--zone-a)}
.sw.b{background:var(--zone-b)}
.sw.w{background:var(--zone-w)}
.sw.c{background:repeating-linear-gradient(45deg,#fff,#fff 2px,var(--zone-c) 2px,var(--zone-c) 4px)}
/* controls */
.controls{display:flex;flex-wrap:wrap;gap:10px;padding:16px 0;align-items:center}
.controls input[type=search]{flex:1;min-width:180px;padding:8px 12px;
  border:1px solid var(--line);background:var(--card);font:inherit;border-radius:2px}
.chip{padding:6px 12px;border:1px solid var(--line);background:var(--card);
  font:600 12px "IBM Plex Sans",sans-serif;cursor:pointer;border-radius:2px}
.chip[aria-pressed=true]{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.chip:focus-visible,a:focus-visible,input:focus-visible{outline:2px solid var(--zone-w);outline-offset:2px}
/* job cards: sagsliste with score spine */
ul{list-style:none;display:flex;flex-direction:column;gap:10px;margin-top:8px}
.job{display:grid;grid-template-columns:56px 1fr;background:var(--card);
  border:1px solid var(--line);border-radius:2px;overflow:hidden}
.spine{display:flex;align-items:center;justify-content:center;
  font:500 17px "IBM Plex Mono",monospace;border-right:1px solid var(--ink);color:#fff}
.spine.a{background:var(--zone-a);color:var(--ink)}
.spine.b{background:var(--zone-b)}
.spine.w{background:var(--zone-w);font-size:20px}
.spine.c{background:repeating-linear-gradient(45deg,#fff,#fff 3px,var(--zone-c) 3px,var(--zone-c) 6px);color:var(--ink)}
.body{padding:12px 16px}
.job h2{font:600 16px/1.3 "IBM Plex Sans",sans-serif}
.job h2 a{color:inherit;text-decoration:none}
.job h2 a:hover{text-decoration:underline}
.meta{font:500 12px "IBM Plex Mono",monospace;color:#5b6168;margin:3px 0 7px}
.verdict{font-size:14px;color:#3a4047}
.empty{padding:48px 0;text-align:center;color:#5b6168}
@media (max-width:520px){.job{grid-template-columns:44px 1fr}}
@media (prefers-reduced-motion:no-preference){
  .job{transition:transform .12s ease}
  .job:hover{transform:translateX(3px)}
}
</style>
</head>
<body>
<div class="wrap">
<header>
  <h1>Job-radar <small id="generated">indlæser…</small></h1>
</header>

<div class="legend" aria-label="Signaturforklaring">
  <span><i class="sw a"></i> 80–100 · søg nu</span>
  <span><i class="sw b"></i> 70–79 · stærk kandidat</span>
  <span><i class="sw w"></i> side ændret · tjek manuelt</span>
  <span><i class="sw c"></i> under grænsen / ikke scoret</span>
</div>

<div class="controls">
  <input type="search" id="q" placeholder="Søg i titel, organisation, begrundelse…" aria-label="Søg">
  <button class="chip" data-c="" aria-pressed="true">Alle lande</button>
  <button class="chip" data-c="DK" aria-pressed="false">DK</button>
  <button class="chip" data-c="SE" aria-pressed="false">SE</button>
  <button class="chip" data-c="NO" aria-pressed="false">NO</button>
  <button class="chip" data-c="BE" aria-pressed="false">BE/EU</button>
  <button class="chip" data-c="DE" aria-pressed="false">DE</button>
  <button class="chip" data-c="NL" aria-pressed="false">NL</button>
  <button class="chip" data-c="IT" aria-pressed="false">IT</button>
  <button class="chip" id="showAll" aria-pressed="false">Vis også &lt; 70</button>
</div>

<ul id="list"></ul>
<p class="empty" id="empty" hidden>Ingen jobs matcher. Radaren kører igen i morgen kl. 07:30.</p>
</div>

<script>
let DATA={jobs:[]},country="",showAll=false;

function band(j){
  if(j.page_watch)return"w";
  if(j.score==null)return"c";
  if(j.score>=80)return"a";
  if(j.score>=70)return"b";
  return"c";
}
function render(){
  const q=document.getElementById("q").value.toLowerCase();
  const list=document.getElementById("list");list.textContent="";
  const min=DATA.min_score??70;
  const rows=DATA.jobs.filter(j=>{
    if(!showAll && !j.page_watch && j.score!=null && j.score<min)return false;
    if(country && j.country!==country)return false;
    if(q && !`${j.title} ${j.org} ${j.verdict}`.toLowerCase().includes(q))return false;
    return true;
  }).sort((x,y)=>(y.score??-1)-(x.score??-1));
  document.getElementById("empty").hidden=rows.length>0;
  for(const j of rows){
    const li=document.createElement("li");li.className="job";
    const b=band(j);
    const spine=document.createElement("div");
    spine.className="spine "+b;
    spine.textContent=j.page_watch?"⚐":(j.score??"–");
    const body=document.createElement("div");body.className="body";
    const h2=document.createElement("h2");
    const a=document.createElement("a");a.href=j.url;a.target="_blank";a.rel="noopener";
    a.textContent=j.title||"(uden titel)";h2.append(a);
    const meta=document.createElement("p");meta.className="meta";
    meta.textContent=[j.org,j.country,j.deadline?("frist "+j.deadline):null,
      j.source].filter(Boolean).join(" · ");
    const v=document.createElement("p");v.className="verdict";
    v.textContent=j.verdict||"";
    body.append(h2,meta,v);li.append(spine,body);list.append(li);
  }
}
document.getElementById("q").addEventListener("input",render);
document.querySelectorAll(".chip[data-c]").forEach(c=>c.addEventListener("click",()=>{
  country=c.dataset.c;
  document.querySelectorAll(".chip[data-c]").forEach(x=>x.setAttribute("aria-pressed",x===c));
  render();
}));
document.getElementById("showAll").addEventListener("click",e=>{
  showAll=!showAll;e.target.setAttribute("aria-pressed",showAll);render();
});
fetch("results.json").then(r=>r.json()).then(d=>{
  DATA=d;
  document.getElementById("generated").textContent=
    `genereret ${d.generated} · grænse ${d.min_score} · ${d.jobs.length} jobs i arkivet`;
  render();
}).catch(()=>{
  document.getElementById("generated").textContent="results.json mangler — kør pipelinen først";
});
</script>
</body>
</html>
