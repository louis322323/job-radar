  - lived diversity
  - everyday multiculturalism
  - rural migration
  - small town
  - small-town
  - peripheral region
  - shrinking cit
  - street-level bureaucra

# Hard excludes — job dies immediately, never scored.
hard_exclude:
  # Wrong professions that sneak into broad searches
  - sygeplejerske
  - pædagog til
  - social- og sundheds
  - sosu
  - lærer til
  - skolelærer
  - fysioterapeut
  - ergoterapeut
  - softwareudvikler
  - software engineer
  - it-konsulent
  - regnskab
  - bogholder
  - elektriker
  - tømrer
  # Excluded DK regions (scoring-rules: Nordjylland, Sønderjylland, Lolland-Falster)
  - nordjylland
  - hjørring
  - frederikshavn
  - sønderjylland
  - sønderborg
  - aabenraa
  - tønder
  - haderslev
  - lolland
  - falster
  - nakskov
  - nykøbing falster
  # PhD types excluded + roller der kræver afsluttet ph.d.
  - doktorandenstelle
  - postdoc
  - postdoctoral
  - adjunkt
  - assistant professor
  - associate professor
  - professorship
  - tenure-track
  - tenured
  # Seniority — strict reading per scoring rules (these get -15 anyway;
  # at entry level they rarely clear 70, so cut them before paying for scoring)
  - "minimum 7 års erfaring"
  - "mindst 7 års erfaring"
  - "10 års erfaring"
  - chefkonsulent
  - afdelingsleder
  - "head of"
  - direktør

# Soft signals passed to the LLM as context flags (not excludes)
flags:
  senior_signals: ["5 års erfaring", "erfaren", "senior", "minimum 5"]
  temp_signals: ["vikariat", "barselsvikar", "tidsbegrænset", "midlertidig"]
  language_risk: ["svenska som arbetsspråk", "norsk som arbeidsspråk", "nederlands vereist", "flydende svensk", "flytande svenska"]
