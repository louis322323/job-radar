# ─────────────────────────────────────────────────────────────
# Pre-filter rules — translated from scoring-rules-compact.md
# This layer is FREE (no LLM). It kills ~90% of listings.
# A job survives if: no hard_exclude hit AND at least one include hit.
# ─────────────────────────────────────────────────────────────

# Sweet-spot terms (any language). One match = job goes to LLM scoring.
include:
  - borgerinddragelse
  - samskabelse
  - borgerdialog
  - boligsocial
  - helhedsplan
  - lokalsamfund
  - landdistrikt
  - landsbyudvikling
  - områdefornyelse
  - bymidte
  - medborgerskab
  - civilsamfund
  - frivillighed
  - proceskonsulent
  - antropolog
  - etnograf
  - kvalitativ
  - byudvikling
  - byplanlæg
  # ─────────────────────────────────────────────────────────
  # SPROG-LOGIK: kun DA + DE + EN søgeord, med vilje.
  # En annonce skrevet på svensk/norsk/hollandsk/fransk/italiensk
  # = arbejdssproget er det sprog = hårdt filter (scoring-rules).
  # Ved IKKE at have de sprog i listen filtreres de automatisk fra.
  # Engelsk-sprogede jobs i Oslo/Stockholm/Amsterdam/Bruxelles/Bolzano
  # fanges af de engelske ord. Tysk-sprogede (DE/AT/CH/Bolzano) af de tyske.
  # ─────────────────────────────────────────────────────────
  # ── German (native) ──
  - quartier          # stamme: -smanager, -smanagement, -sentwicklung, -sarbeit, -simpulse
  - stadtteil         # stamme: -arbeit, -entwicklung, -zentrum
  - stadterneuerung
  - bürgerbeteiligung
  - stadtentwicklung
  - gemeinwesenarbeit
  - sozialraum
  - partizipation
  - zivilgesellschaft
  - dorfentwicklung
  - sozialer zusammenhalt
  # ── English (C1-C2) ──
  - community engagement
  - citizen participation
  - public participation
  - participatory
  - co-creation
  - co-design
  - social housing
  - urban develop
  - urban regeneration
  - urban planning
  - community develop
  - community organis
  - neighbourhood
  - neighborhood
  - placemaking
  - civil society
  - migration
  - integration officer
  - integrationsindsats
  - integrationsmedarbejder
  - integrationskonsulent
  - integrationsområd
  - migrant integration
  - refugee integration
  - asyl
  - refugee
  - flygtning
  - geflücht
  - regularis
  - social cohesion
  - qualitative research
  - ethnograph
  - anthropolog
  - stakeholder engagement
  - facilitation
  - inclusive cities
  # ── Academic: TITLER kvalificerer IKKE (ellers passerer kemi-ph.d.'er).
  #    Kilderne henter akademiske opslag; EMNE-ordene her afgør match. ──
  - bystudier
  - byforskning
  - boligforskning
  - migrationsforsk
  - integrationsforsk
  - mobilitetsforsk
  - velfærdsforsk
  - urban studies
  - urban sociology
  - urban anthropology
  - migration studies
