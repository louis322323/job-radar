# ─────────────────────────────────────────────────────────────
# JOB RADAR — sources
#
# Three adapter types:
#   jobtech_api   : Swedish Platsbanken open API (no key, structured JSON)
#   rss           : RSS/Atom feeds (Jobindex supports this — stable)
#   html_list     : HTML pages with CSS selectors for job items
#   page_watch    : small org pages — we just hash the text and alert
#                   "page changed, check manually". Never breaks.
#
# Tip: run `python main.py --test-source <name>` to test one source.
# ─────────────────────────────────────────────────────────────

sources:

  # ══════════ DENMARK — aggregators (replaces ~40 career pages) ══════════

  - name: jobindex-borgerinddragelse
    type: html_list
    url: "https://www.jobindex.dk/jobsoegning?q=borgerinddragelse+OR+samskabelse+OR+borgerdialog"
    selectors: {link_pattern: "/vis-job/"}
    country: DK

  - name: jobindex-boligsocial
    type: html_list
    url: "https://www.jobindex.dk/jobsoegning?q=boligsocial+OR+helhedsplan+OR+%22almene+boliger%22"
    selectors: {link_pattern: "/vis-job/"}
    country: DK

  - name: jobindex-lokalsamfund
    type: html_list
    url: "https://www.jobindex.dk/jobsoegning?q=landdistrikt+OR+lokalsamfund+OR+bymidte+OR+omr%C3%A5defornyelse"
    selectors: {link_pattern: "/vis-job/"}
    country: DK

  - name: jobindex-antropolog
    type: html_list
    url: "https://www.jobindex.dk/jobsoegning?q=antropolog+OR+etnograf+OR+%22kvalitativ+analyse%22"
    selectors: {link_pattern: "/vis-job/"}
    country: DK

  - name: jobindex-proces-frivillighed
    type: html_list
    url: "https://www.jobindex.dk/jobsoegning?q=proceskonsulent+OR+frivillighedskonsulent+OR+civilsamfund"
    selectors: {link_pattern: "/vis-job/"}
    country: DK

  - name: jobindex-kvarter-medborger
    type: html_list
    url: "https://www.jobindex.dk/jobsoegning?q=kvarterhus+OR+medborgerhus+OR+beboerhus+OR+%22boligsocial+helhedsplan%22+OR+kvartersudvikling"
    selectors: {link_pattern: "/vis-job/"}
    country: DK

  # ══════════ SWEDEN — open API, zero scraping risk ══════════

  - name: platsbanken-stockholm
    type: jobtech_api
    url: "https://jobsearch.api.jobtechdev.se/search"
    params:
      q: "urban planning"  # bevidst smal: kun EN-sprogede Stockholm-roller er i scope, udbyttet er lavt
      municipality: "AvNB_uwa_6n6"   # Stockholm
      limit: 50
    country: SE

  # ══════════ NORWAY ══════════

  - name: finn-oslo
    type: html_list
    url: "https://www.finn.no/job/fulltime/search.html?location=0.20061&q=urban%20development%20english"  # kun EN-sprogede Oslo-roller er i scope
    selectors:
      item: "article"
      title: "h2"
      link: "a"
    country: "NO"

  # ══════════ BRUSSELS / EU ══════════

  - name: eurobrussels-social
    type: html_list
    url: "https://www.eurobrussels.com/jobs/employment_and_social_affairs"
    selectors: {link_pattern: "job_display"}
    country: BE

  - name: eurobrussels-migration
    type: html_list
    url: "https://www.eurobrussels.com/jobs/justice_freedom_and_security"
    selectors: {link_pattern: "job_display"}
    country: BE

  - name: eurobrussels-rights
    type: html_list
    url: "https://www.eurobrussels.com/jobs/human_rights_and_democracy"
    selectors: {link_pattern: "job_display"}
    country: BE

  # ══════════ GERMANY / BERLIN ══════════

  - name: arbeitsagentur-quartier
    type: arbeitsagentur_api
    params: {was: "Quartiersmanagement", size: 50}
    country: DE

  - name: arbeitsagentur-stadtteil
    type: arbeitsagentur_api
    params: {was: "Stadtteilarbeit Gemeinwesenarbeit", size: 50}
    country: DE

  # ══════════ NETHERLANDS (English-primary only — filtered downstream) ══════════

  - name: academictransfer
    type: rss
    url: "https://www.academictransfer.com/en/jobs/feed/?q=urban+OR+migration+OR+participation+OR+anthropology"
    country: NL

  # ══════════ BOLZANO ══════════

  - name: eurac
    type: page_watch
    url: "https://www.eurac.edu/en/job-opportunities"
    country: IT

  # ══════════ DK niche orgs & job boards — now scraped for real postings ══════════
  # Was page_watch ("side ændret"-støj). Now dk_careers: pulls the actual
  # vacancy links and scores them. Server-rendered pages yield jobs; a few
  # JS-only sites stay silent (no false "side ændret" cards either way).
  - {name: urban-creators,    type: dk_careers, org: "Urban Creators",        url: "https://urbancreators.dk/en/job/", country: DK}
  - {name: opland,            type: dk_careers, org: "Opland",                url: "https://www.opland.eu/ledige-stillinger/", country: DK}
  - {name: wedodemocracy,     type: dk_careers, org: "We Do Democracy",       url: "https://www.wedodemocracy.dk/om/", country: DK}
  - {name: nordregio,         type: dk_careers, org: "Nordregio",             url: "https://nordregio.org/career/", country: DK}
  - {name: nordic-safe-cities,type: dk_careers, org: "Nordic Safe Cities",    url: "https://nordicsafecities.org/careers/", country: DK}
  - {name: gehl,              type: dk_careers, org: "Gehl",                  url: "https://www.gehlpeople.com/careers/", country: DK}
  - {name: copenhagenize,     type: dk_careers, org: "Copenhagenize",         url: "https://www.copenhagenize.eu/join-us", country: DK}
  - {name: cifs,              type: dk_careers, org: "Inst. for Fremtidsforskning", url: "https://www.cifs.dk/info/jobs", country: DK}
  - {name: thewhy,            type: dk_careers, org: "The Why",               url: "https://www.thewhy.dk/info/jobs-internships", country: DK}
  - {name: socialtansvar,     type: dk_careers, org: "Socialt Ansvar",        url: "https://socialtansvar.dk/ledige-stillinger/", country: DK}
  - {name: vive,              type: dk_careers, org: "VIVE",                  url: "https://www.vive.dk/da/om-vive/ledige-stillinger/", country: DK}
  - {name: realdania,         type: dk_careers, org: "Realdania",             url: "https://realdania.dk/om-os/ledige-stillinger", country: DK}
  - {name: bl-jobportal,      type: dk_careers, org: "BL Jobportal",          url: "https://bl.dk/jobportalen/?filter=5078", country: DK}
  - {name: byplanlab,         type: dk_careers, org: "Dansk Byplanlab",       url: "https://byplanlab.dk/da/jobboers", country: DK}
  - {name: moedrehjaelpen,    type: dk_careers, org: "Mødrehjælpen",          url: "https://moedrehjaelpen.dk/om-os/job/", country: DK}
  - {name: crossing-borders,  type: dk_careers, org: "Crossing Borders",      url: "https://karrierevejviser.dk/companies/54244/jobs/crossing-borders/", country: DK}


  # ══════════ ACADEMIC — research assistant + employed PhD ══════════
  # Jobindex dækker danske universiteters opslag (KU, AU, SDU, RUC, AAU-CPH)
  - name: jobindex-videnskabelig-assistent
    type: html_list
    url: "https://www.jobindex.dk/jobsoegning?q=%22videnskabelig+assistent%22+OR+forskningsassistent"
    selectors: {link_pattern: "/vis-job/"}
    country: DK

  - name: jobindex-phd
    type: html_list
    url: "https://www.jobindex.dk/jobsoegning?q=%22ph.d.-stipendium%22+OR+%22ph.d.-stilling%22+OR+erhvervsphd"
    selectors: {link_pattern: "/vis-job/"}
    country: DK

  # IMISCOE: DET centrale jobboard for migrationsforskning i Europa —
  # rammer præcis migration/integration/encounter-niche, mest EN-sprogede opslag
  - name: imiscoe-jobs
    type: html_list
    url: "https://www.imiscoe.org/news-and-blog/jobs-opportunities"
    selectors:
      item: ".items-row, .blog-item, article, .item"
      title: "a"
      link: "a"
    country: EU

  # Eurac Bolzano: Center for Migration & Societal Change + Institute for
  # Regional Development = migration i små byer/landdistrikter. Allerede
  # page_watch'et ovenfor (kilden 'eurac').


  # ══════════ DK career pages — direct postings, scored like every other country ══════════
  # Was a wall of page_watch "Side ændret" cards that could not be scored.
  # Now grouped by ATS platform and scraped for individual vacancies.
  #
  # Individual kommune overview pages (Lejre, Køge, Rudersdal, LTK, Gentofte,
  # Ishøj, Rødovre, Dragør, Albertslund, Tårnby, Vallensbæk, Holbæk, Roskilde,
  # Frederiksberg) were REMOVED on purpose: every one of those vacancies is
  # already indexed by the Jobindex aggregators above, so scraping them too
  # would only create duplicate cards. Jobindex is the workhorse for DK.

  # ── Emply (server-rendered HTML, scrapeable). Verify a tenant the first time
  #    it has a live vacancy:  python main.py --test-source dk-oxfam-dk ──
  - {name: dk-oxfam-dk,  type: dk_careers, org: "Oxfam Danmark",     url: "https://oxfam-dk.career.emply.com/da/ledige-stillinger", country: DK}
  - {name: dk-alleroed,  type: dk_careers, org: "Allerød Kommune",   url: "https://alleroed.career.emply.com/ledige-stillinger", country: DK}
  - {name: dk-furesoe,   type: dk_careers, org: "Furesø Kommune",    url: "https://furesoe.career.emply.com/ledige-stillinger", country: DK}
  - {name: dk-stevns,    type: dk_careers, org: "Stevns Kommune",    url: "https://stevns.career.emply.com/", country: DK}
  - {name: dk-brondby,   type: dk_careers, org: "Brøndby Kommune",   url: "https://brondby.career.emply.com/job-i-kommunen", country: DK}
  - {name: dk-herlev,    type: dk_careers, org: "Herlev Kommune",    url: "https://herlev.career.emply.com/da/ledige-stillinger", country: DK}

  # ── Varbi (clean /job/ links, prints deadline inline — confirmed working) ──
  - name: dk-ringsted
    type: html_list
    org: "Ringsted Kommune"
    url: "https://ringsted.varbi.com/job-vacancies"
    selectors: {link_pattern: "/job/"}
    country: DK

  # ── HR-Manager (Talent Recruiter). May rate-limit automated fetchers; if a
  #    run logs 0 here, leave it — Jobindex covers Kræftens Bekæmpelse & RUC. ──
  - {name: dk-hrm-cancer, type: dk_careers, org: "Kræftens Bekæmpelse", url: "https://candidate.hr-manager.net/vacancies/list.aspx?customer=Cancer", country: DK}
  - {name: dk-hrm-ruc,    type: dk_careers, org: "RUC",                 url: "https://candidate.hr-manager.net/vacancies/list.aspx?customer=ruc", country: DK}

  # ── Recruitio / Signatur / job boards ──
  - {name: dk-khr,             type: dk_careers, org: "KHR Architecture",  url: "https://khr.recruitio.dk/job-openings/", country: DK}
  - {name: dk-portal-signatur, type: dk_careers, org: "Signatur portal",   url: "https://portal.signatur.dk/ExtJobs/DefaultHosting/JobList.aspx?ClientId=1493", country: DK}
  - {name: dk-arkitektforeningen, type: dk_careers, org: "Arkitektforeningen jobbørs", url: "https://arkitektforeningen.dk/jobbors/", country: DK}

  # ── Architecture / consultancy firms. Several are JavaScript SPAs and will
  #    return 0 with a requests-only fetch — that is fine (silent, not noise).
  #    For the few firms you care most about, a Jobindex company search is the
  #    reliable backup. ──
  - {name: dk-3xn,            type: dk_careers, org: "3XN",            url: "https://3xn.com/career", country: DK}
  - {name: dk-cfmoller,       type: dk_careers, org: "C.F. Møller",    url: "https://www.cfmoller.com/j/Job", country: DK}
  - {name: dk-ramboll,        type: dk_careers, org: "Rambøll",        url: "https://www.ramboll.com/careers?workplace=copenhagen&free-text=planning", country: DK}
  - {name: dk-arkitema,       type: dk_careers, org: "Arkitema",       url: "https://www.arkitema.com/dk/karriere", country: DK}
  - {name: dk-henninglarsen,  type: dk_careers, org: "Henning Larsen", url: "https://henninglarsen.com/careers", country: DK}
  - {name: dk-sla,            type: dk_careers, org: "SLA",            url: "https://www.sla.dk/career/", country: DK}
  - {name: dk-skala,          type: dk_careers, org: "Skala",          url: "https://skala.dk/kontakt/job", country: DK}
  - {name: dk-lytt,           type: dk_careers, org: "LYTT",           url: "https://www.lytt.dk/job", country: DK}
  - {name: dk-urbanpower,     type: dk_careers, org: "Urban Power",    url: "https://urbanpower.dk/info/", country: DK}
  - {name: dk-implement,      type: dk_careers, org: "Implement",      url: "https://implementconsultinggroup.com/join-us/jobs?location=Hellerup", country: DK}
  - {name: dk-greencapacity,  type: dk_careers, org: "Green Capacity", url: "https://www.greencapacity.eu/en/", country: DK}
  - {name: dk-kunstakademiet, type: dk_careers, org: "Kunstakademiet", url: "https://kunstakademiet.dk/en/om-kunstakademiet/ledige-stillinger", country: DK}
  - {name: dk-pluskontoret,   type: dk_careers, org: "Pluskontoret",   url: "https://www.pluskontoret.dk/kontakt#Job", country: DK}
  - {name: dk-dgi,            type: dk_careers, org: "DGI",            url: "https://www.dgi.dk/om-dgi/job-i-dgi", country: DK}

# Spain note: InfoJobs/hacesfalta have no stable feeds and the language
# barrier makes auto-scoring unreliable. Recommend: manual monthly check,
# or add a page_watch on a saved hacesfalta search URL once you have one.
